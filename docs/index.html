<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Taste on Wheels — Fast · Fresh · Flavorful</title>
    <meta name="description" content="Taste on Wheels food truck — bold flavors made fresh to order. Halal burgers, gyro wraps, steak & cheese, rice bowls and more." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script type="module" crossorigin src="/food_truck_website/assets/index-v2.js"></script>
    <link rel="stylesheet" crossorigin href="/food_truck_website/assets/index-v2.css">
    <style>
      /* colour overrides — applied after any cached CSS */
      :root { --gold: #545454; }
      .gold, .section-title .gold { color: #e3bc32 !important; }
      .byob-hero-title { color: #e3bc32 !important; }
      .byob-hero { border-bottom-color: #e3bc32 !important; }
      .btn-gold { background: #e3bc32 !important; border-color: #e3bc32 !important; color: #111 !important; }
      .btn-gold:hover { background: #c9a620 !important; border-color: #c9a620 !important; }
      .btn-outline-gold { color: #e3bc32 !important; border-color: #e3bc32 !important; }
      .btn-outline-gold:hover { background: #e3bc32 !important; color: #111111 !important; }
      .navbar { border-bottom-color: #e3bc32 !important; }
      .nav-logo-taste { color: #e3bc32 !important; }
      .nav-links a::after { background: #e3bc32 !important; }
      .nav-links a.active { color: #e3bc32 !important; }
      .nav-cart-btn:hover { border-color: #e3bc32 !important; }
      .nav-order-btn { background: #e3bc32 !important; border-color: #e3bc32 !important; color: #111 !important; }
      .mobile-overlay a:hover, .mobile-overlay a.active { color: #e3bc32 !important; }
      .chip-tag:hover { background: #e3bc32 !important; border-color: #e3bc32 !important; color: #111 !important; transform: scale(1.04); }
      .chip-featured { border-color: var(--border) !important; color: var(--white) !important; }
      .chip-featured:hover { background: #e3bc32 !important; border-color: #e3bc32 !important; color: #111 !important; }
      .item-price, .oi-price, .protein-price, .combo-price { color: #e3bc32 !important; }
      .hero-h1-gold { color: #e3bc32 !important; }
      .why-card:hover { border-top-color: #e3bc32 !important; }
      .why-title { color: #e3bc32 !important; }
      .cat-num { color: #e3bc32 !important; opacity: 1 !important; }
      .combo-price, .combo-desc strong { color: #e3bc32 !important; }
      .combo-title { color: #ffffff !important; }
      .combo-desc { color: rgba(255,255,255,.85) !important; }
      .footer-logo-taste { color: #e3bc32 !important; }
      .about-badge { background: var(--red) !important; color: var(--white) !important; }
      .about-hero-badge { background: #e3bc32 !important; }
      .story-quote { color: #e3bc32 !important; border-left-color: #e3bc32 !important; }
      .story-highlight strong { color: #e3bc32 !important; }
      .story-stat-bar { background: #e3bc32 !important; }
      .value-title { color: #e3bc32 !important; }
      .stat-num { color: #e3bc32; }
      .team-role { color: #e3bc32 !important; }
      .ld-label { color: #e3bc32 !important; }
      .eyebrow { color: #e3bc32 !important; }
      .page-hero-eyebrow { color: #e3bc32 !important; }
      .contact-title { color: #e3bc32 !important; }
      .hours-note { color: #e3bc32 !important; border-left-color: #e3bc32 !important; }
      .contact-card:hover, .payment-card:hover, .stat-block:hover, .value-card:hover, .team-card:hover, .protein-card:hover, .social-img:hover, .footer-social a:hover { border-color: #e3bc32 !important; }
      .btn-dark:hover { border-color: #e3bc32 !important; }
      .value-card::before { color: rgba(227,188,50,.2) !important; }
      .clover-desc strong { color: #e3bc32 !important; }
      .clover-note { color: #e3bc32 !important; }
      .clover-cancel { color: var(--white) !important; }
      .clover-cancel:hover { color: var(--red) !important; }
      .clover-modal { border-top-color: #e3bc32 !important; }
      .order-cat-name { color: #e3bc32 !important; }
      .combo-upsell strong { color: #e3bc32 !important; }
      .combo-banner-sm .combo-title { color: #ffffff !important; }
      .combo-banner-sm .combo-desc { color: #ffffff !important; }
      .footer-tagline { color: #e3bc32 !important; }
      .hero-plate-label { color: #e3bc32 !important; }
      .chip-pill { color: #e3bc32 !important; border-color: #e3bc32 !important; }
      .how-title { color: #e3bc32 !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
